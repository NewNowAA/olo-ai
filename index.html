      :root {

        --glass-border: rgba(255, 255, 255, 0.5);
      }
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #f8fafc;
        /* Subtle gradient background based on new colors */
        background-image:

          radial-gradient(circle at 90% 80%, rgba(139, 215, 191, 0.1) 0%, transparent 40%);

      .custom-gradient {
        background: linear-gradient(135deg, #73c6df 0%, #8bd7bf 100%);
      }
      .custom-text-gradient {
        background: linear-gradient(135deg, #73c6df 0%, #2dd4bf 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      /* Hide scrollbar for clean UI */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
