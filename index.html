<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GEFACT.AI — Gestão Inteligente de Faturas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Legacy compat - moved to theme.css, kept minimal fallback */
    .custom-gradient {
      background: linear-gradient(135deg, #1042FF 0%, #00B8FD 100%);
    }
    .custom-text-gradient {
      background: linear-gradient(135deg, #1042FF 0%, #00B8FD 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes float {
      0% { transform: translate(0px, 0px) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
      100% { transform: translate(0px, 0px) scale(1); }
    }
    .animate-float { animation: float 15s ease-in-out infinite; }
    .animate-float-delayed { animation: float 18s ease-in-out infinite reverse; }
  </style>

</head>

<body>
  <div id="debug-error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,0,0,0.9); color:white; padding:20px; z-index:9999; overflow:auto; font-family:monospace;">
    <h2>System Critical Error</h2>
    <pre id="debug-error-content"></pre>
  </div>
  <script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      document.getElementById('debug-error-overlay').style.display = 'block';
      document.getElementById('debug-error-content').innerText += `Error: ${msg}\nUrl: ${url}\nLine: ${lineNo}\nColumn: ${columnNo}\nStack: ${error ? error.stack : 'N/A'}\n\n`;
      return false;
    };
    window.onunhandledrejection = function(event) {
      document.getElementById('debug-error-overlay').style.display = 'block';
      document.getElementById('debug-error-content').innerText += `Unhandled Rejection: ${event.reason}\n\n`;
    };
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
