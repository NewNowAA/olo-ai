<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumea Financial</title>
  <title>Lumea Financial</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-teal-primary: #73c6df;
      --color-mint-secondary: #8bd7bf;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f8fafc;
    }

    .custom-gradient {
      background: linear-gradient(135deg, #73c6df 0%, #8bd7bf 100%);
    }

    .custom-text-gradient {
      background: linear-gradient(135deg, #73c6df 0%, #2dd4bf 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Hide scrollbar for clean UI */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Floating Animation for Background Blobs */
    @keyframes float {
      0% {
        transform: translate(0px, 0px) scale(1);
      }

      33% {
        transform: translate(30px, -50px) scale(1.1);
      }

      66% {
        transform: translate(-20px, 20px) scale(0.9);
      }

      100% {
        transform: translate(0px, 0px) scale(1);
      }
    }

    .animate-float {
      animation: float 15s ease-in-out infinite;
    }

    .animate-float-delayed {
      animation: float 18s ease-in-out infinite reverse;
    }
  </style>

</head>

<body>
  <div id="debug-error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,0,0,0.9); color:white; padding:20px; z-index:9999; overflow:auto; font-family:monospace;">
    <h2>System Critical Error</h2>
    <pre id="debug-error-content"></pre>
  </div>
  <script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      document.getElementById('debug-error-overlay').style.display = 'block';
      document.getElementById('debug-error-content').innerText += `Error: ${msg}\nUrl: ${url}\nLine: ${lineNo}\nColumn: ${columnNo}\nStack: ${error ? error.stack : 'N/A'}\n\n`;
      return false;
    };
    window.onunhandledrejection = function(event) {
      document.getElementById('debug-error-overlay').style.display = 'block';
      document.getElementById('debug-error-content').innerText += `Unhandled Rejection: ${event.reason}\n\n`;
    };
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
